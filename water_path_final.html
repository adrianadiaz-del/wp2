      addPulse(idx+1);
    } else {
      document.getElementById("si").innerHTML="<b style=\"color:"+GREEN+"\">All components explored!</b> Click Reset to start over.";
    }
  });
}

function resetAll(){
  cur=-1;
  document.getElementById("sb").textContent="Step 0 / "+STEPS.length;
  document.getElementById("si").innerHTML="Click the pulsing dot on <b>Water Source</b> to begin.";
  document.getElementById("pl").innerHTML="";
  document.getElementById("lines-layer").innerHTML="";
  renderDots();
  buildHitTargets();
  addPulse(0);
}

document.getElementById("resetbtn").addEventListener("click",resetAll);
resetAll();
</script></body></html>
